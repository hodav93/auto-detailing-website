# Production deploy (Coolify auto-deploy)
services:
  web:
    build:
      context: .
      args:
        PUBLIC_CMS_URL: ${PUBLIC_CMS_URL:-https://app.boxbook.hu}
        PUBLIC_SITE_URL: ${PUBLIC_SITE_URL:-https://boxbook.hu}
    image: boxbook-marketing:latest
    container_name: boxbook-marketing
    ports:
      - "3002:80"
    restart: unless-stopped
