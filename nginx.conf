server {
  listen 80;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;

  # gzip
  gzip on;
  gzip_vary on;
  gzip_min_length 256;
  gzip_proxied any;
  gzip_types
    text/plain
    text/css
    text/javascript
    application/javascript
    application/json
    image/svg+xml;

  # cache statikus assetekre (1 hónap)
  location /assets/ {
    expires 30d;
    add_header Cache-Control "public, max-age=2592000, immutable";
  }

  # config / docker fájlok elrejtése (dir-mount miatt látnák őket)
  location ~ \.(yml|yaml|conf|env|md|dockerfile)$ { deny all; }
  location ~ ^/(Dockerfile|\.dockerignore|\.git) { deny all; }

  # SPA-szerű fallback (most csak 1 oldal, de jól jön ha bővítünk)
  location / {
    try_files $uri $uri/ /index.html;
  }

  # apró biztonsági header-ek
  add_header X-Frame-Options "SAMEORIGIN" always;
  add_header X-Content-Type-Options "nosniff" always;
  add_header Referrer-Policy "strict-origin-when-cross-origin" always;
}
