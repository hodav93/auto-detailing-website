<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0a0a0a"/>
      <stop offset="1" stop-color="#18181b"/>
    </linearGradient>
    <linearGradient id="grad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#84cc16"/>
      <stop offset="0.5" stop-color="#10b981"/>
      <stop offset="1" stop-color="#06b6d4"/>
    </linearGradient>
    <radialGradient id="glow1" cx="0.15" cy="0.25">
      <stop offset="0" stop-color="#84cc16" stop-opacity="0.4"/>
      <stop offset="1" stop-color="#84cc16" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow2" cx="0.85" cy="0.75">
      <stop offset="0" stop-color="#06b6d4" stop-opacity="0.4"/>
      <stop offset="1" stop-color="#06b6d4" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- háttér -->
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#glow1)"/>
  <rect width="1200" height="630" fill="url(#glow2)"/>

  <!-- grid -->
  <g stroke="rgba(255,255,255,0.05)" stroke-width="1">
    <path d="M0 100 H1200 M0 200 H1200 M0 300 H1200 M0 400 H1200 M0 500 H1200"/>
    <path d="M100 0 V630 M200 0 V630 M300 0 V630 M400 0 V630 M500 0 V630 M600 0 V630 M700 0 V630 M800 0 V630 M900 0 V630 M1000 0 V630 M1100 0 V630"/>
  </g>

  <!-- logo + brand -->
  <g transform="translate(80, 80)">
    <rect width="68" height="68" rx="16" fill="#09090b"/>
    <rect x="3" y="3" width="62" height="62" rx="13" fill="url(#grad)"/>
    <path d="M34 18c4.5 6.2 14 15.5 14 25.2a14 14 0 1 1-28 0c0-9.7 9.5-19 14-25.2z" fill="none" stroke="white" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="92" y="44" font-family="sans-serif" font-size="38" font-weight="800" fill="#ffffff" letter-spacing="-1">BoxBook</text>
    <text x="92" y="68" font-family="sans-serif" font-size="14" font-weight="600" fill="rgba(255,255,255,0.5)" letter-spacing="2">FOGLALÁSI RENDSZER</text>
  </g>

  <!-- nagy headline -->
  <g transform="translate(80, 240)">
    <text font-family="sans-serif" font-size="80" font-weight="900" fill="#ffffff" letter-spacing="-3">
      <tspan x="0" y="0">Foglalási rendszer</tspan>
      <tspan x="0" y="90" fill="url(#grad)">autókozmetikáknak.</tspan>
    </text>
  </g>

  <!-- alszöveg -->
  <g transform="translate(80, 460)">
    <text font-family="sans-serif" font-size="22" fill="rgba(255,255,255,0.7)" font-weight="500">
      <tspan x="0" y="0">Mosóállás-alapú naptár · Jármű-profilok · Hűségpont</tspan>
      <tspan x="0" y="30">Számlázz.hu · SMS · Stripe · Google sync</tspan>
    </text>
  </g>

  <!-- ár-chip -->
  <g transform="translate(80, 550)">
    <rect width="280" height="50" rx="25" fill="url(#grad)"/>
    <text x="140" y="33" font-family="sans-serif" font-size="20" font-weight="800" fill="#09090b" text-anchor="middle" letter-spacing="-0.5">9 900 Ft / hó · 14 nap próba</text>
  </g>

  <!-- jobb felső badge -->
  <g transform="translate(960, 80)">
    <rect width="160" height="32" rx="16" fill="rgba(255,255,255,0.08)" stroke="rgba(255,255,255,0.15)" stroke-width="1"/>
    <circle cx="20" cy="16" r="4" fill="#22c55e"/>
    <text x="32" y="21" font-family="sans-serif" font-size="12" font-weight="700" fill="rgba(255,255,255,0.9)" letter-spacing="1">ÉLŐ DEMÓ</text>
  </g>

  <!-- jobb alsó: mini naptár-mockup -->
  <g transform="translate(740, 280)">
    <rect width="380" height="280" rx="16" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.1)" stroke-width="1"/>
    <!-- chrome -->
    <circle cx="20" cy="20" r="4" fill="rgba(255,255,255,0.15)"/>
    <circle cx="34" cy="20" r="4" fill="rgba(255,255,255,0.15)"/>
    <circle cx="48" cy="20" r="4" fill="rgba(255,255,255,0.15)"/>
    <!-- naptár sorok -->
    <g font-family="sans-serif" font-size="11" fill="rgba(255,255,255,0.7)" font-weight="700">
      <text x="20" y="70">Mosó01</text>
      <text x="20" y="120">Mosó02</text>
      <text x="20" y="170">Mosó03</text>
      <text x="20" y="220">Mosó04</text>
    </g>
    <!-- foglalások -->
    <rect x="90" y="56" width="100" height="22" rx="5" fill="#ffffff"/>
    <rect x="200" y="56" width="140" height="22" rx="5" fill="url(#grad)"/>
    <rect x="90" y="106" width="220" height="22" rx="5" fill="url(#grad)"/>
    <rect x="90" y="156" width="50" height="22" rx="5" fill="#ffffff"/>
    <rect x="150" y="156" width="50" height="22" rx="5" fill="#ffffff"/>
    <rect x="210" y="156" width="100" height="22" rx="5" fill="rgba(16,185,129,0.2)" stroke="rgba(16,185,129,0.5)" stroke-width="1" stroke-dasharray="3 3"/>
    <rect x="130" y="206" width="80" height="22" rx="5" fill="#ffffff"/>
    <rect x="220" y="206" width="120" height="22" rx="5" fill="rgba(16,185,129,0.2)" stroke="rgba(16,185,129,0.5)" stroke-width="1" stroke-dasharray="3 3"/>
  </g>
</svg>
